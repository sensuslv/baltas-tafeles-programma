name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Project Dependencies
      run: npm install

    - name: Inject Electron Support
      shell: pwsh
      run: |
        npm install electron electron-builder --save-dev
        
        # Izveido main.js failu rindinu pa rindinai, lai nebutu citu simbolu kludu
        "const { app, BrowserWindow } = require('electron');" | Out-File -FilePath main.js -Encoding utf8
        "const path = require('path');" | Add-Content -Path main.js
        "function createWindow () {" | Add-Content -Path main.js
        "  const win = new BrowserWindow({ width: 1200, height: 800, autoHideMenuBar: true, webPreferences: { nodeIntegration: false } });" | Add-Content -Path main.js
        "  win.loadFile(path.join(__dirname, 'dist/index.html'));" | Add-Content -Path main.js
        "}" | Add-Content -Path main.js
        "app.whenReady().then(createWindow);" | Add-Content -Path main.js
        "app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });" | Add-Content -Path main.js
        
        # Izveido update-package.js failu package.json labosanai
        "const fs = require('fs');" | Out-File -FilePath update-package.js -Encoding utf8
        "const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));" | Add-Content -Path update-package.js
        "p.main = 'main.js';" | Add-Content -Path update-package.js
        "p.version = p.version || '1.0.0';" | Add-Content -Path update-package.js
        "p.author = p.author || 'Baltas Tafeles Izstradatajs';" | Add-Content -Path update-package.js
        "p.description = p.description || 'Baltas tafeles programma';" | Add-Content -Path update-package.js
        "p.build = { appId: 'com.baltatafele.app', win: { target: 'nsis' }, directories: { output: 'dist-electron' } };" | Add-Content -Path update-package.js
        "fs.writeFileSync('package.json', JSON.stringify(p, null, 2), 'utf8');" | Add-Content -Path update-package.js
        
        # Palatiz skriptu
        node update-package.js

    - name: Build Web App (Lovable code)
      run: npm run build

    - name: Package Windows Installer (.exe)
      run: npx electron-builder build --windows
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Whiteboard-Installer
        path: dist-electron/*.exe
