name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # Šis solis tagad uzbūvē Lovable tīmekļa lietotni un rada "dist" mapi
    - name: Build Web App (Lovable code)
      run: |
        npm install
        npm run build

    - name: Inject Electron Support
      shell: pwsh
      run: |
        # Lokāli uzstādām pakotājus šim solim
        npm install electron electron-builder --save-dev
        
        # Izveido main.js failu tīrā UTF-8
        $mainJs = @"
        const { app, BrowserWindow } = require('electron');
        const path = require('path');
        function createWindow () {
          const win = new BrowserWindow({ 
            width: 1200, 
            height: 800, 
            autoHideMenuBar: true, 
            webPreferences: { nodeIntegration: false, contextIsolation: true } 
          });
          win.loadFile(path.join(__dirname, 'dist/index.html'));
        }
        app.whenReady().then(createWindow);
        app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
        "@
        Set-Content -Path main.js -Value $mainJs -Encoding utf8
        
        # Pilnībā pārrakstām tīru package.json, kas nepieciešams tikai Electron būvēšanai
        $packageJson = @"
        {
          "name": "baltas-tafeles-programma",
          "version": "1.0.0",
          "author": "Baltas Tafeles Izstradatajs",
          "description": "Baltas tafeles programma",
          "main": "main.js",
          "devDependencies": {
            "electron": "^30.0.0",
            "electron-builder": "^24.13.3"
          },
          "build": {
            "appId": "com.baltatafele.app",
            "win": {
              "target": "nsis"
            },
            "directories": {
              "output": "dist-electron"
            },
            "files": [
              "dist/**/*",
              "main.js",
              "package.json"
            ]
          }
        }
        "@
        Set-Content -Path package.json -Value $packageJson -Encoding utf8

    - name: Package Windows Installer (.exe)
      run: npx electron-builder build --windows
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Whiteboard-Installer
        path: dist-electron/*.exe
